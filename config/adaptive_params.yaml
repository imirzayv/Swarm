# Adaptive Area Monitoring — Algorithm Parameters
# Used by voronoi_coordinator.py and response_selector.py

# ── Monitoring Area ─────────────────────────────────────────────────────────
area_size: 200          # side length in meters (200x200m monitoring area)
altitude: 40            # default drone altitude in meters

# ── Voronoi Coverage ────────────────────────────────────────────────────────
update_rate: 0.5        # Voronoi update frequency in Hz (every 2s)
detection_sigma: 15.0   # Gaussian spread of detection bumps in meters
detection_weight: 10.0  # peak weight multiplier for detection Gaussian
decay_half_life: 30.0   # detection bump decay half-life in seconds
max_detection_age: 120.0  # prune detections older than this (seconds)

# ── Class Priority Map ──────────────────────────────────────────────────────
# Maps YOLO/COCO class names to priority weights.
# Higher priority = stronger attraction in the density function.
class_priorities:
  person: 0.9
  vehicle: 0.6
  car: 0.6
  truck: 0.6
  bus: 0.6
  fire: 1.0

# ── Class-Specific Formations ──────────────────────────────────────────────
# Each class triggers a different swarm formation when detected.
formations:
  person:
    type: cluster         # tight inspection cluster
    num_drones: 2         # number of drones to assign
    radius: 3.0           # radius from detection center (meters)
  vehicle:
    type: chain           # tracking chain along heading
    num_drones: 2         # number of drones in chain
    separation: 8.0       # separation between drones (meters)
  car:
    type: chain
    num_drones: 2
    separation: 8.0
  truck:
    type: chain
    num_drones: 2
    separation: 8.0
  fire:
    type: perimeter       # wide perimeter triangle
    num_drones: 3         # number of drones for perimeter
    radius: 10.0          # radius of perimeter (meters)

# Default formation for unknown classes
default_formation:
  type: cluster
  num_drones: 2
  radius: 5.0

# ── Dual-Mode Exploration/Exploitation ─────────────────────────────────────
exploit_confidence_threshold: 0.4   # minimum confidence to trigger exploit mode
exploit_timeout_s: 30.0             # return to explore after this many seconds
exploit_confidence_drop: 0.2        # reform if confidence drops below this
min_explore_drones: 1               # minimum drones that must remain exploring
                                    #   (3 drones: 1 | 5 drones: 2 recommended)
max_concurrent_exploits: 2          # how many independent events can be serviced
                                    # at once. Must be ≤ floor((n_drones −
                                    # min_explore_drones) / formation_size).
exploit_merge_radius_m: 20.0        # detections within this distance of an
                                    # active exploit reinforce it instead of
                                    # opening a second slot on the same event

# ── Cross-Drone Target Registry ────────────────────────────────────────────
# A persistent, swarm-wide list of physical targets. Detections of the
# same class within `target_merge_radius_m` of an existing entry update
# it instead of creating a new one — this is how a target seen by drone
# A is recognised when drone B sees it later. See voronoi_coordinator.py
# (TargetRegistry) for the implementation. Currently configured via CLI
# args; these YAML keys document the defaults.
target_merge_radius_m: 8.0          # cross-drone dedup radius (tighter than
                                    # exploit_merge_radius_m because we want
                                    # the registry to track individual
                                    # targets, not event neighbourhoods)
min_confirmations: 3                # detections needed before counting a
                                    # candidate as a confirmed target —
                                    # filters single-frame YOLO false positives

# ── Explore-Mode Confirmed-Target Repulsion ────────────────────────────────
# Inside `confirmed_repulsion_sigma_m` of any confirmed target the
# explore-mode density collapses to baseline — confirmed targets are
# treated as already-explored landmarks. Hard zero-out (not a Gaussian
# subtraction) because exploit drones hovering on a stationary target
# emit detections at multiple Hz and the bump grows unboundedly.
# Exploit drones use formation waypoints directly and ignore this.
confirmed_repulsion_sigma_m: 25.0   # zero-out radius (m) around each
                                    # confirmed target
confirmed_repulsion_weight: 1.0     # any value >0 enables hard zero-out
                                    # AND density-write suppression for
                                    # confirmed targets (so bumps can't
                                    # keep growing past the zero-out
                                    # radius). Set to 0 to disable both
                                    # — ablation mode that restores
                                    # write-every-detection behaviour.

# ── Per-Target Exploit Cooldown ────────────────────────────────────────────
# When an exploit ends, the matching confirmed target is put in cooldown
# for `cooldown_after_exploit_s` — fresh detections on it are ignored
# during that window so the swarm actually has time to explore elsewhere
# instead of immediately retriggering on a still-visible target.
cooldown_after_exploit_s: 60.0      # seconds; 0 disables the cooldown

# ── Completion Trigger ─────────────────────────────────────────────────────
# When the run hits one of these, the coordinator publishes
# /adaptive/complete (latched Bool, same contract as /lawnmower/complete)
# and shuts down. The data logger stops on either topic. This makes
# adaptive's mission energy directly comparable to lawnmower's.
expected_targets: null              # if set, complete when this many targets
                                    # are confirmed. run_experiment.sh passes
                                    # the trial's --targets count via CLI.
completion_quiet_period_s: 0.0      # if >0, also complete after this many
                                    # seconds without a new confirmation
                                    # (heuristic stopping for unknown N)

# ── Detection Publisher ────────────────────────────────────────────────────
detection_confidence: 0.15   # YOLO confidence threshold
frame_skip: 5                # process every Nth frame
